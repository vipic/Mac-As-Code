name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shell-syntax:
    name: Shell Syntax
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check shell scripts
        run: |
          bash -n ./*.sh
          bash -n ./lib/*.sh
