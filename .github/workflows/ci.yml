name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shell-syntax:
    name: Shell Syntax
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check shell scripts
        run: |
          bash -n ./*.sh
          bash -n ./scripts/*.sh
          bash -n ./config/*.sh
          bash -n ./tests/fixtures/*.sh

      - name: Check config format
        run: sh scripts/check_format.sh --self-test
